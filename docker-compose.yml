services:
  temporal:
    image: temporalio/server:1.25.2
    command: server start-dev --ip 0.0.0.0 --ui-ip 0.0.0.0
    ports:
      - "7233:7233"
      - "8233:8233"
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address 127.0.0.1:7233 || tctl --address 127.0.0.1:7233 cluster health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - agentic_net

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m app.worker
    env_file:
      - .env
    environment:
      TEMPORAL_SERVER_URL: temporal:7233
    depends_on:
      temporal:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      disable: true
    networks:
      - agentic_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      TEMPORAL_SERVER_URL: temporal:7233
    ports:
      - "8000:8000"
    depends_on:
      temporal:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - agentic_net

networks:
  agentic_net:
    driver: bridge
