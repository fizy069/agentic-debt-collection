<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pipeline Test Console</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 1rem 1.5rem; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 1rem; }
  header h1 { font-size: 1rem; font-weight: 600; color: #f8fafc; }
  .badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 9999px; font-weight: 500; }
  .badge-stage { background: #1d4ed8; color: #bfdbfe; }
  .badge-done { background: #15803d; color: #bbf7d0; }
  .badge-err { background: #b91c1c; color: #fecaca; }
  main { flex: 1; display: flex; flex-direction: column; max-width: 720px; width: 100%; margin: 0 auto; }

  /* setup form */
  #setup { padding: 1.5rem; display: flex; flex-direction: column; gap: 0.75rem; }
  #setup h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; margin-bottom: 0.25rem; }
  .field { display: flex; gap: 0.5rem; align-items: center; }
  .field label { width: 130px; font-size: 0.8rem; color: #94a3b8; flex-shrink: 0; }
  .field input { flex: 1; padding: 6px 10px; border-radius: 6px; border: 1px solid #334155; background: #1e293b; color: #f1f5f9; font-size: 0.85rem; }
  .field input:focus { outline: none; border-color: #3b82f6; }
  button { padding: 8px 18px; border-radius: 6px; border: none; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-primary:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

  /* chat area */
  #chat-area { display: none; flex: 1; flex-direction: column; }
  #messages { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
  .msg { max-width: 85%; padding: 8px 12px; border-radius: 10px; font-size: 0.85rem; line-height: 1.5; word-wrap: break-word; }
  .msg-borrower { align-self: flex-end; background: #1d4ed8; color: #fff; border-bottom-right-radius: 2px; }
  .msg-agent { align-self: flex-start; background: #1e293b; color: #e2e8f0; border: 1px solid #334155; border-bottom-left-radius: 2px; }
  .msg-system { align-self: center; background: transparent; color: #64748b; font-size: 0.75rem; font-style: italic; }
  .msg-stage { font-size: 0.65rem; color: #94a3b8; margin-top: 2px; }

  /* input bar */
  #input-bar { padding: 0.75rem 1.5rem; background: #1e293b; border-top: 1px solid #334155; display: flex; gap: 0.5rem; }
  #input-bar input { flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #f1f5f9; font-size: 0.85rem; }
  #input-bar input:focus { outline: none; border-color: #3b82f6; }

  /* status bar */
  #status-bar { padding: 0.5rem 1.5rem; background: #1e293b; border-top: 1px solid #334155; font-size: 0.7rem; color: #64748b; display: flex; gap: 1rem; }

  /* incoming call card */
  #call-incoming {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    padding: 2rem 1.5rem;
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    border: 1px solid #334155;
    border-radius: 12px;
    margin: 1rem 1.5rem;
    animation: pulse-border 2s ease-in-out infinite;
  }
  @keyframes pulse-border {
    0%, 100% { border-color: #334155; }
    50% { border-color: #22c55e; }
  }
  #call-incoming .call-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: #15803d; display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; animation: ring 1.2s ease-in-out infinite;
  }
  @keyframes ring {
    0%, 100% { transform: rotate(0deg); }
    10% { transform: rotate(14deg); }
    20% { transform: rotate(-10deg); }
    30% { transform: rotate(8deg); }
    40% { transform: rotate(-6deg); }
    50%, 100% { transform: rotate(0deg); }
  }
  #call-incoming .call-label { font-size: 0.95rem; color: #f8fafc; font-weight: 600; }
  #call-incoming .call-sub { font-size: 0.75rem; color: #94a3b8; }
  #call-incoming .call-actions { display: flex; gap: 1rem; }
  .btn-accept { background: #15803d; color: #fff; padding: 10px 28px; border-radius: 9999px; font-weight: 600; }
  .btn-accept:hover { background: #16a34a; }
  .btn-decline { background: #7f1d1d; color: #fecaca; padding: 10px 28px; border-radius: 9999px; font-weight: 600; }
  .btn-decline:hover { background: #991b1b; }

  /* call panel */
  #call-panel {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 1.5rem;
    background: #1e293b;
    border-top: 1px solid #334155;
  }
  #call-panel .call-status-pill {
    font-size: 0.7rem;
    padding: 3px 12px;
    border-radius: 9999px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .pill-idle { background: #334155; color: #94a3b8; }
  .pill-listening { background: #dc2626; color: #fff; animation: pulse-pill 1s ease-in-out infinite; }
  @keyframes pulse-pill {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .pill-thinking { background: #ca8a04; color: #fff; }
  .pill-speaking { background: #2563eb; color: #fff; }
  #call-panel .call-controls { display: flex; gap: 1rem; align-items: center; }
  .btn-endcall { background: #b91c1c; color: #fff; padding: 8px 22px; border-radius: 9999px; font-size: 0.8rem; font-weight: 600; }
  .btn-endcall:hover { background: #dc2626; }

  /* volume visualizer */
  .volume-bar-container {
    width: 180px; height: 6px; background: #334155; border-radius: 3px; overflow: hidden;
  }
  .volume-bar-fill {
    height: 100%; width: 0%; background: #22c55e; border-radius: 3px;
    transition: width 0.08s linear;
  }
</style>
</head>
<body>

<header>
  <h1>Debt Collection Pipeline - Test Console</h1>
  <span id="stage-badge" class="badge badge-stage" style="display:none"></span>
</header>

<main>
  <div id="setup">
    <h2>Start a new pipeline</h2>
    <div class="field">
      <label>Borrower ID</label>
      <input id="f-bid" value="B-TEST-001">
    </div>
    <div class="field">
      <label>Account Ref</label>
      <input id="f-acct" value="ACCT-9876">
    </div>
    <div class="field">
      <label>Debt Amount</label>
      <input id="f-debt" type="number" value="4500">
    </div>
    <div class="field">
      <label>Days Past Due</label>
      <input id="f-dpd" type="number" value="45">
    </div>
    <div class="field">
      <label>Initial Message</label>
      <input id="f-msg" value="I received a notice and want to understand my options.">
    </div>
    <button id="btn-start" class="btn-primary" onclick="startPipeline()">Start Pipeline</button>
  </div>

  <div id="chat-area">
    <div id="messages"></div>

    <div id="call-incoming">
      <div class="call-icon">&#128222;</div>
      <div class="call-label">Incoming Resolution Call</div>
      <div class="call-sub">Agent 2 is ready to negotiate via voice</div>
      <div class="call-actions">
        <button class="btn-accept" onclick="acceptCall()">Accept</button>
        <button class="btn-decline" onclick="declineCall()">Decline</button>
      </div>
    </div>

    <div id="call-panel">
      <span id="call-status" class="call-status-pill pill-idle">Idle</span>
      <div class="volume-bar-container">
        <div id="volume-bar" class="volume-bar-fill"></div>
      </div>
      <div class="call-controls">
        <button class="btn-endcall" onclick="endCall()">End Call</button>
      </div>
    </div>

    <div id="input-bar">
      <input id="chat-input" placeholder="Type a message as the borrower..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button class="btn-primary" onclick="sendMessage()">Send</button>
    </div>
    <div id="status-bar">
      <span>Workflow: <strong id="sb-wf">-</strong></span>
      <span>Stage: <strong id="sb-stage">-</strong></span>
      <span>Status: <strong id="sb-status">-</strong></span>
    </div>
  </div>
</main>

<audio id="tts-player" style="display:none"></audio>

<script>
var API = '';
var workflowId = null;
var seenMessageCount = 0;
var pollTimer = null;

var voiceEnabled = false;
var inVoiceCall = false;
var voiceCallShown = false;

var mediaStream = null;
var mediaRecorder = null;
var audioChunks = [];
var isRecording = false;

var audioCtx = null;
var analyserNode = null;
var vadFrameId = null;
var vadActive = false;
var speechDetected = false;
var silenceStart = 0;

var fillerBlob = null;
var pendingRealAudio = null;
var fillerPlaying = false;

var SPEECH_THRESHOLD = 30;
var SILENCE_DURATION_MS = 1500;

/* ---- Config ---- */

async function fetchConfig() {
  try {
    var res = await fetch(API + '/config');
    if (res.ok) {
      var cfg = await res.json();
      voiceEnabled = cfg.agent2_voice_enabled === true;
    }
  } catch (_) {}
}

/* ---- Pipeline start ---- */

async function startPipeline() {
  var btn = document.getElementById('btn-start');
  btn.disabled = true;
  btn.textContent = 'Starting...';

  await fetchConfig();

  var body = {
    borrower: {
      borrower_id: document.getElementById('f-bid').value,
      account_reference: document.getElementById('f-acct').value,
      debt_amount: parseFloat(document.getElementById('f-debt').value),
      days_past_due: parseInt(document.getElementById('f-dpd').value),
      borrower_message: document.getElementById('f-msg').value,
    }
  };

  try {
    var res = await fetch(API + '/pipelines', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      var err = await res.json().catch(function() { return {}; });
      throw new Error(err.detail || res.statusText);
    }
    var data = await res.json();
    workflowId = data.workflow_id;

    document.getElementById('setup').style.display = 'none';
    document.getElementById('chat-area').style.display = 'flex';
    document.getElementById('sb-wf').textContent = workflowId;

    addSystemMsg('Pipeline started. Workflow: ' + workflowId);
    if (voiceEnabled) addSystemMsg('Voice mode enabled for Resolution stage.');
    addBorrowerMsg(body.borrower.borrower_message);

    seenMessageCount = 0;
    voiceCallShown = false;
    startPolling();
  } catch (e) {
    addSystemMsg('ERROR: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Start Pipeline';
  }
}

/* ---- Text messaging ---- */

async function sendMessage() {
  var input = document.getElementById('chat-input');
  var text = input.value.trim();
  if (!text || !workflowId) return;
  input.value = '';

  addBorrowerMsg(text);

  try {
    var res = await fetch(API + '/pipelines/' + workflowId + '/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    if (!res.ok) {
      var err = await res.json().catch(function() { return {}; });
      throw new Error(err.detail || res.statusText);
    }
  } catch (e) {
    addSystemMsg('Send failed: ' + e.message);
  }
}

/* ---- Polling ---- */

async function pollStatus() {
  if (!workflowId) return;
  try {
    var res = await fetch(API + '/pipelines/' + workflowId);
    if (!res.ok) return;
    var data = await res.json();

    document.getElementById('sb-stage').textContent = data.current_stage;
    document.getElementById('sb-status').textContent =
      data.completed ? 'completed' : data.failed ? 'failed' : 'running';

    var badge = document.getElementById('stage-badge');
    badge.style.display = 'inline';
    badge.textContent = data.current_stage;
    badge.className = 'badge ' + (data.completed ? 'badge-done' : data.failed ? 'badge-err' : 'badge-stage');

    if (voiceEnabled && data.current_stage === 'resolution' && !voiceCallShown && !inVoiceCall) {
      voiceCallShown = true;
      showIncomingCall();
    }

    if (inVoiceCall && data.current_stage !== 'resolution') {
      endCall();
      addSystemMsg('Resolution call ended — stage advanced to ' + data.current_stage);
    }

    if (!inVoiceCall) {
      var transcript = data.transcript || [];
      while (seenMessageCount < transcript.length) {
        var msg = transcript[seenMessageCount];
        if (msg.role === 'agent') {
          addAgentMsg(msg.text, msg.stage);
        }
        seenMessageCount++;
      }
    }

    if (data.completed || data.failed) {
      stopPolling();
      if (inVoiceCall) endCall();
      var label = data.completed ? 'Pipeline completed' : 'Pipeline failed';
      addSystemMsg(label + (data.final_outcome ? ' (' + data.final_outcome + ')' : '') + (data.error ? ': ' + data.error : ''));
      document.getElementById('chat-input').disabled = true;
    }
  } catch (_) {}
}

function startPolling() {
  pollStatus();
  pollTimer = setInterval(pollStatus, 1500);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

/* ---- Incoming call card ---- */

function showIncomingCall() {
  document.getElementById('call-incoming').style.display = 'flex';
  document.getElementById('input-bar').style.display = 'none';
}

function hideIncomingCall() {
  document.getElementById('call-incoming').style.display = 'none';
}

async function acceptCall() {
  hideIncomingCall();
  inVoiceCall = true;
  document.getElementById('call-panel').style.display = 'flex';
  document.getElementById('input-bar').style.display = 'none';
  setCallStatus('speaking');
  addSystemMsg('Resolution voice call started.');

  /* Fetch filler audio in background */
  fetchFillerAudio();

  /* Fetch and play greeting */
  try {
    var res = await fetch(API + '/voice-greeting?workflow_id=' + encodeURIComponent(workflowId));
    if (res.ok) {
      var data = await res.json();
      if (data.audio_base64 && data.audio_mime) {
        addAgentMsg(data.assistant_reply, 'resolution');
        seenMessageCount += 1;
        await playAudioAndWait(data.audio_base64, data.audio_mime);
      }
    }
  } catch (_) {
    addSystemMsg('Could not fetch greeting audio.');
  }

  if (inVoiceCall) {
    await initVAD();
    beginListening();
  }
}

function declineCall() {
  hideIncomingCall();
  document.getElementById('input-bar').style.display = 'flex';
  addSystemMsg('Voice call declined. Using text mode for Resolution.');
}

function endCall() {
  inVoiceCall = false;
  vadActive = false;
  if (vadFrameId) { cancelAnimationFrame(vadFrameId); vadFrameId = null; }
  stopRecordingSilent();
  if (mediaStream) {
    mediaStream.getTracks().forEach(function(t) { t.stop(); });
    mediaStream = null;
  }
  if (audioCtx) {
    audioCtx.close().catch(function() {});
    audioCtx = null;
    analyserNode = null;
  }
  fillerBlob = null;
  pendingRealAudio = null;
  fillerPlaying = false;
  document.getElementById('call-panel').style.display = 'none';
  document.getElementById('input-bar').style.display = 'flex';
  document.getElementById('tts-player').pause();
  document.getElementById('volume-bar').style.width = '0%';
}

/* ---- Call status pill ---- */

function setCallStatus(state) {
  var el = document.getElementById('call-status');
  var labels = { idle: 'Idle', listening: 'Listening', thinking: 'Thinking...', speaking: 'Agent Speaking' };
  var pills = { idle: 'pill-idle', listening: 'pill-listening', thinking: 'pill-thinking', speaking: 'pill-speaking' };
  el.textContent = labels[state] || state;
  el.className = 'call-status-pill ' + (pills[state] || 'pill-idle');
}

/* ---- Filler audio ---- */

async function fetchFillerAudio() {
  try {
    var res = await fetch('/static/filler.mp3');
    if (res.ok) {
      fillerBlob = await res.blob();
      console.log('[voice] filler.mp3 cached', fillerBlob.size, 'bytes');
    } else {
      console.warn('[voice] filler.mp3 fetch failed:', res.status);
    }
  } catch (e) { console.warn('[voice] filler.mp3 fetch error:', e); }
}

function playFillerAudio() {
  if (!fillerBlob) { console.warn('[voice] no filler blob cached'); return false; }
  fillerPlaying = true;
  var url = URL.createObjectURL(fillerBlob);
  var player = document.getElementById('tts-player');
  player.onended = null;
  player.pause();
  player.src = url;
  player.onended = function() {
    URL.revokeObjectURL(url);
    fillerPlaying = false;
    onFillerEnded();
  };
  player.play().then(function() {
    console.log('[voice] filler playing');
  }).catch(function(e) {
    console.warn('[voice] filler play() rejected:', e);
    fillerPlaying = false;
    onFillerEnded();
  });
  return true;
}

function onFillerEnded() {
  if (!inVoiceCall) return;
  if (pendingRealAudio) {
    var real = pendingRealAudio;
    pendingRealAudio = null;
    setCallStatus('speaking');
    playRealAudio(real.audio_base64, real.audio_mime);
  }
}

function playRealAudio(b64, mime) {
  var raw = atob(b64);
  var arr = new Uint8Array(raw.length);
  for (var i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  var blob = new Blob([arr], { type: mime });
  var url = URL.createObjectURL(blob);

  var player = document.getElementById('tts-player');
  player.src = url;
  player.onended = function() {
    URL.revokeObjectURL(url);
    if (inVoiceCall) {
      beginListening();
    }
  };
  setCallStatus('speaking');
  player.play().catch(function() {
    if (inVoiceCall) beginListening();
  });
}

function playAudioAndWait(b64, mime) {
  return new Promise(function(resolve) {
    var raw = atob(b64);
    var arr = new Uint8Array(raw.length);
    for (var i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
    var blob = new Blob([arr], { type: mime });
    var url = URL.createObjectURL(blob);
    var player = document.getElementById('tts-player');
    player.src = url;
    player.onended = function() {
      URL.revokeObjectURL(url);
      resolve();
    };
    player.play().catch(function() { resolve(); });
  });
}

/* ---- VAD (Voice Activity Detection) ---- */

async function initVAD() {
  if (!mediaStream) {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  }
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  var source = audioCtx.createMediaStreamSource(mediaStream);
  analyserNode = audioCtx.createAnalyser();
  analyserNode.fftSize = 512;
  analyserNode.smoothingTimeConstant = 0.3;
  source.connect(analyserNode);
}

function beginListening() {
  if (!inVoiceCall) return;
  setCallStatus('listening');
  speechDetected = false;
  silenceStart = 0;
  vadActive = true;
  vadLoop();
}

function vadLoop() {
  if (!vadActive || !inVoiceCall) return;

  var bufLen = analyserNode.frequencyBinCount;
  var dataArray = new Uint8Array(bufLen);
  analyserNode.getByteFrequencyData(dataArray);

  var sum = 0;
  for (var i = 0; i < bufLen; i++) sum += dataArray[i];
  var avgVolume = sum / bufLen;

  var pct = Math.min(100, Math.round((avgVolume / 128) * 100));
  document.getElementById('volume-bar').style.width = pct + '%';

  var now = Date.now();

  if (avgVolume >= SPEECH_THRESHOLD) {
    if (!speechDetected) {
      speechDetected = true;
      startVADRecording();
    }
    silenceStart = 0;
  } else if (speechDetected) {
    if (!silenceStart) {
      silenceStart = now;
    } else if (now - silenceStart >= SILENCE_DURATION_MS) {
      vadActive = false;
      stopRecordingAndProcess();
      return;
    }
  }

  vadFrameId = requestAnimationFrame(vadLoop);
}

function startVADRecording() {
  if (isRecording) return;
  audioChunks = [];
  var mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
    ? 'audio/webm;codecs=opus'
    : 'audio/webm';
  mediaRecorder = new MediaRecorder(mediaStream, { mimeType: mimeType });
  mediaRecorder.ondataavailable = function(e) {
    if (e.data.size > 0) audioChunks.push(e.data);
  };
  mediaRecorder.start();
  isRecording = true;
}

function stopRecordingSilent() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.onstop = null;
    mediaRecorder.stop();
  }
  isRecording = false;
  audioChunks = [];
}

function stopRecordingAndProcess() {
  if (!mediaRecorder || mediaRecorder.state === 'inactive') {
    beginListening();
    return;
  }
  mediaRecorder.onstop = onVADRecordingDone;
  mediaRecorder.stop();
  isRecording = false;
}

async function onVADRecordingDone() {
  var mimeType = (mediaRecorder && mediaRecorder.mimeType) ? mediaRecorder.mimeType : 'audio/webm';
  var blob = new Blob(audioChunks, { type: mimeType });
  audioChunks = [];

  if (blob.size === 0) {
    if (inVoiceCall) beginListening();
    return;
  }

  setCallStatus('thinking');
  document.getElementById('volume-bar').style.width = '0%';
  pendingRealAudio = null;

  var fillerStarted = playFillerAudio();

  var form = new FormData();
  form.append('audio', blob, 'recording.webm');

  try {
    var res = await fetch(API + '/pipelines/' + workflowId + '/voice-turn', {
      method: 'POST',
      body: form,
    });
    if (!res.ok) {
      var err = await res.json().catch(function() { return {}; });
      throw new Error(err.detail || res.statusText);
    }
    var data = await res.json();

    seenMessageCount += 2;
    addBorrowerMsg(data.transcribed_text);
    addAgentMsg(data.assistant_reply, 'resolution');

    if (data.current_stage !== 'resolution' || data.stage_complete) {
      addSystemMsg('Resolution stage complete.');
    }

    if (!data.audio_base64 || !data.audio_mime) {
      if (inVoiceCall) beginListening();
      return;
    }

    if (fillerPlaying) {
      pendingRealAudio = { audio_base64: data.audio_base64, audio_mime: data.audio_mime };
    } else {
      setCallStatus('speaking');
      playRealAudio(data.audio_base64, data.audio_mime);
    }
  } catch (e) {
    addSystemMsg('Voice turn failed: ' + e.message);
    if (inVoiceCall) beginListening();
  }
}

/* ---- Chat message helpers ---- */

function addBorrowerMsg(text) {
  var el = document.createElement('div');
  el.className = 'msg msg-borrower';
  el.textContent = text;
  appendMsg(el);
}

function addAgentMsg(text, stage) {
  var el = document.createElement('div');
  el.className = 'msg msg-agent';
  el.textContent = text;
  if (stage) {
    var s = document.createElement('div');
    s.className = 'msg-stage';
    s.textContent = stage;
    el.appendChild(s);
  }
  appendMsg(el);
}

function addSystemMsg(text) {
  var el = document.createElement('div');
  el.className = 'msg msg-system';
  el.textContent = text;
  appendMsg(el);
}

function appendMsg(el) {
  var container = document.getElementById('messages');
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}
</script>
</body>
</html>
